<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapita</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAh7cgObhkQmdg3U5A_g7LJHHISZHYzVVU",
            authDomain: "mapitauwu.firebaseapp.com",
            databaseURL: "https://mapitauwu-default-rtdb.firebaseio.com",
            projectId: "mapitauwu",
            storageBucket: "mapitauwu.appspot.com",
            messagingSenderId: "370557096285",
            appId: "1:370557096285:web:f7151affcf37fa0e5658b4",
            measurementId: "G-ZHS2H7SBGX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Token público de Mapbox
        mapboxgl.accessToken = "pk.eyJ1IjoibGlhbmFyaSIsImEiOiJjbW01bjlsd2wwMnUyMnFxNHV3YjcyZmR1In0.2Oij-VtaQqoBIA-GvuydGg";

        const map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/streets-v11",
            center: [-68.15, -16.5],
            zoom: 12
        });

        const marker = new mapboxgl.Marker({ color: "purple" }).addTo(map);

        const ubicacionRef = ref(db, "ubicacion");

        // Actualizar cada 5 segundos
        setInterval(async () => {
            try {
                const snapshot = await get(ubicacionRef);
                const data = snapshot.val();
                if (data) {
                    marker.setLngLat([data.lng, data.lat]);
                    map.setCenter([data.lng, data.lat]);
                }
            } catch (e) {
                console.error("Error leyendo Firebase:", e);
            }
        }, 5000);
    </script>
</body>
</html>
