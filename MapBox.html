<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapita</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.16.1/mapbox-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.16.1/mapbox-gl.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAh7cgObhkQmdg3U5A_g7LJHHISZHYzVVU",
            authDomain: "mapitauwu.firebaseapp.com",
            databaseURL: "https://mapitauwu-default-rtdb.firebaseio.com",
            projectId: "mapitauwu",
            storageBucket: "mapitauwu.appspot.com",
            messagingSenderId: "370557096285",
            appId: "1:370557096285:web:f7151affcf37fa0e5658b4",
            measurementId: "G-ZHS2H7SBGX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        mapboxgl.accessToken = "pk.eyJ1IjoibGlhbmFyaSIsImEiOiJjbW01MmRkMHcwMmQwMnBuMG10cHVkM21qIn0.6Bi_v-0rgL9eKyR71PFzhA"; // usa tu token público
        const map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/streets-v11",
            center: [-68.15, -16.5],
            zoom: 12
        });

        const marker = new mapboxgl.Marker({ color: "purple" }).addTo(map);

        // Escuchar cambios en Firebase
        const ubicacionRef = ref(db, "ubicacion");
        onValue(ubicacionRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                marker.setLngLat([data.lng, data.lat]);
                map.setCenter([data.lng, data.lat]);
            }
        });
    </script>

    </script>
</body>

</html>
